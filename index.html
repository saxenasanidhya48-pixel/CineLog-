<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CineLog Pro v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .theme-cherry-blossom { background: linear-gradient(rgba(12, 8, 20, 0.88), rgba(20, 12, 32, 0.92)); }
    </style>
</head>
<body class="theme-cherry-blossom min-h-screen text-white p-6">
    
    <!-- UI Layout -->
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-pink-300">CineLog Ultimate v1.1</h1>

        <!-- INPUT SECTION -->
        <div class="bg-zinc-900 p-6 rounded-xl border border-white/10 mb-8">
            <input type="hidden" id="editId">
            <div class="grid grid-cols-2 gap-4">
                <input id="title" placeholder="Title" class="bg-black p-3 rounded border border-white/10">
                <select id="type" class="bg-black p-3 rounded border border-white/10">
                    <option>Movie</option>
                    <option>Web Series</option>
                </select>
                <input id="rating" type="number" placeholder="Rating" class="bg-black p-3 rounded border border-white/10">
                <input id="status" placeholder="Status" class="bg-black p-3 rounded border border-white/10">
            </div>
            <button onclick="saveEntry()" id="saveBtn" class="w-full mt-4 bg-pink-600 py-3 rounded font-bold">ADD ENTRY</button>
        </div>

        <!-- TABLE -->
        <table class="w-full text-left">
            <thead><tr class="text-gray-400 border-b border-white/10">
                <th class="p-3">Title</th><th class="p-3">Rating</th><th class="p-3">Status</th><th class="p-3">Action</th>
            </tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('my_data')) || [];

        function saveEntry() {
            const id = document.getElementById('editId').value;
            const entry = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('title').value,
                type: document.getElementById('type').value,
                rating: document.getElementById('rating').value,
                status: document.getElementById('status').value
            };
            
            if(id) { data = data.map(i => i.id == id ? entry : i); } 
            else { data.push(entry); }
            
            localStorage.setItem('my_data', JSON.stringify(data));
            resetForm(); render();
        }

        function render() {
            document.getElementById('list').innerHTML = data.map(i => `
                <tr class="border-b border-white/5 hover:bg-white/5 cursor-pointer" onclick="editEntry(${i.id})">
                    <td class="p-3">${i.title}</td>
                    <td class="p-3">${i.rating || '-'}</td>
                    <td class="p-3">${i.status || '-'}</td>
                    <td class="p-3 text-red-400" onclick="event.stopPropagation(); del(${i.id})"><i class="fas fa-trash"></i></td>
                </tr>
            `).join('');
        }

        function editEntry(id) {
            const i = data.find(x => x.id == id);
            document.getElementById('editId').value = i.id;
            document.getElementById('title').value = i.title;
            document.getElementById('rating').value = i.rating;
            document.getElementById('status').value = i.status;
            document.getElementById('saveBtn').innerText = "UPDATE ENTRY";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('title').value = '';
            document.getElementById('saveBtn').innerText = "ADD ENTRY";
        }

        function del(id) {
            data = data.filter(i => i.id !== id);
            localStorage.setItem('my_data', JSON.stringify(data));
            render();
        }

        render();
    </script>
</body>
</html>
