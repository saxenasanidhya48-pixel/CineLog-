<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLog Ultimate | Enterprise Grade Media Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Engine for Glassmorphism & Themes */
        :root { --glass: rgba(255, 255, 255, 0.05); }
        .theme-midnight { background: radial-gradient(circle, #1e1b4b, #020617); }
        .theme-cherry { background: radial-gradient(circle, #4c0519, #0f0505); }
        .theme-cyber { background: radial-gradient(circle, #064e3b, #020617); }
        
        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
        }
        
        /* Smooth transition for theme switching */
        body { transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Custom Scrollbar for heavy data */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="theme-midnight min-h-screen text-white p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-5xl font-black tracking-tighter mb-2">CineLog <span class="text-pink-500">Ultimate</span></h1>
                <p class="text-gray-400">Professional Media Tracking & Analytics Core</p>
            </div>
            <div class="glass-panel p-2 rounded-full flex gap-2">
                <button onclick="setTheme('theme-midnight')" class="w-8 h-8 rounded-full bg-indigo-900 border-2 border-white/20"></button>
                <button onclick="setTheme('theme-cherry')" class="w-8 h-8 rounded-full bg-red-900 border-2 border-white/20"></button>
                <button onclick="setTheme('theme-cyber')" class="w-8 h-8 rounded-full bg-emerald-900 border-2 border-white/20"></button>
            </div>
        </header>

        <main class="grid grid-cols-1 xl:grid-cols-4 gap-8">
            
            <section class="xl:col-span-1">
                <div class="glass-panel p-8 rounded-3xl sticky top-8">
                    <h2 class="text-2xl font-bold mb-6 flex items-center">
                        <i class="fas fa-terminal text-pink-500 mr-3"></i>Data Input
                    </h2>
                    
                    <form id="mediaForm" class="space-y-4">
                        <input type="hidden" id="editId">
                        
                        <div class="space-y-1">
                            <label class="text-xs text-gray-500 uppercase tracking-widest">Title Name</label>
                            <input id="title" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 focus:border-pink-500 outline-none">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-xs text-gray-500 uppercase tracking-widest">Format</label>
                                <select id="type" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 outline-none">
                                    <option>Movie</option><option>Web Series</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs text-gray-500 uppercase tracking-widest">Rating</label>
                                <input id="rating" type="number" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 outline-none">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-xs text-gray-500 uppercase tracking-widest">Status</label>
                            <input id="status" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 outline-none">
                        </div>

                        <button type="button" onclick="saveEntry()" id="saveBtn" class="w-full mt-8 bg-white text-black py-4 rounded-xl font-black text-lg hover:bg-gray-200 transition">
                            EXECUTE LOG
                        </button>
                    </form>
                </div>
            </section>

            <section class="xl:col-span-3">
                <div class="glass-panel rounded-3xl overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-white/5">
                            <tr class="text-gray-400 text-xs uppercase tracking-widest">
                                <th class="p-6">Title</th>
                                <th class="p-6">Format</th>
                                <th class="p-6">Rating</th>
                                <th class="p-6">Status</th>
                                <th class="p-6 text-right">Operations</th>
                            </tr>
                        </thead>
                        <tbody id="list" class="divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Data Handling Logic
        let data = JSON.parse(localStorage.getItem('my_data')) || [];

        function setTheme(c) { document.body.className = c + " min-h-screen text-white p-6 md:p-12"; }

        function saveEntry() {
            const id = document.getElementById('editId').value;
            const entry = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('title').value,
                type: document.getElementById('type').value,
                rating: document.getElementById('rating').value,
                status: document.getElementById('status').value
            };
            
            if(!entry.title) { alert("Title is required"); return; }

            if(id) { data = data.map(i => i.id == id ? entry : i); } 
            else { data.push(entry); }
            
            localStorage.setItem('my_data', JSON.stringify(data));
            resetForm(); render();
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = data.map(i => `
                <tr class="hover:bg-white/5 transition group cursor-pointer" onclick="editEntry(${i.id})">
                    <td class="p-6 font-bold text-lg">${i.title}</td>
                    <td class="p-6 text-gray-400">${i.type}</td>
                    <td class="p-6 text-pink-400">${i.rating}</td>
                    <td class="p-6 text-gray-300">${i.status}</td>
                    <td class="p-6 text-right">
                        <button onclick="event.stopPropagation(); del(${i.id})" class="text-red-500 hover:text-red-300">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function editEntry(id) {
            const i = data.find(x => x.id == id);
            document.getElementById('editId').value = i.id;
            document.getElementById('title').value = i.title;
            document.getElementById('type').value = i.type;
            document.getElementById('rating').value = i.rating;
            document.getElementById('status').value = i.status;
            document.getElementById('saveBtn').innerText = "COMMIT UPDATE";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('mediaForm').reset();
            document.getElementById('saveBtn').innerText = "EXECUTE LOG";
        }

        function del(id) {
            data = data.filter(i => i.id !== id);
            localStorage.setItem('my_data', JSON.stringify(data));
            render();
        }

        render();
    </script>
</body>
</html>
